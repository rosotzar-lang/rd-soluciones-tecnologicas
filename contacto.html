<div class="modalOverlay" id="quoteOverlay" aria-hidden="true">

        </div>

        <div class="field">
          <label for="estado">Estado</label>
          <input id="estado" class="input" type="text" name="estado" placeholder="Ingresa tu Estado" required>
        </div>
      </div>

      <div class="field">

      </div>

      <div class="field">

          <label class="pill" for="plazoCorto">Corto Plazo</label>

      <label class="check">

      <button class="btn-primary" type="submit" style="width:100%;">

  </div>
</div>

<!-- JS FINAL (REEMPLAZA TODO css/js/app.js CON ESTO) -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const openBtns = document.querySelectorAll(".openQuote");
  const overlay = document.getElementById("quoteOverlay");
  const closeBtn = document.getElementById("closeQuote");

  if (!openBtns.length || !overlay || !closeBtn) return;

  const openModal = () => {
    overlay.classList.add("show");
    overlay.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  };

  const closeModal = () => {
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  };

  openBtns.forEach(btn => btn.addEventListener("click", openModal));
  closeBtn.addEventListener("click", closeModal);

  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });

  const form = document.getElementById("quoteForm");
  if (form) {
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      alert("¡Listo! Recibimos tu solicitud.");
      form.reset();
      closeModal();
    });
  }
});
</script>
