<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | RD Soluciones Tecnológicas</title>

  <link rel="icon" href="./logo.png">
  <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>

<header class="header">
  <div class="container nav">
    <a href="index.html" class="logo">
      <img src="./logo.png" alt="RD Soluciones Tecnológicas">
    </a>

    <nav class="menu">
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="contacto.html" class="active">Contacto</a>
      <button id="openQuote" class="btn-primary">Cotizar</button>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Contacto</h1>
    <p>Escríbenos y te respondemos rápido.</p>
  </div>
</section>

<section class="container" style="padding-bottom:80px;">
  <div class="grid">
    <article class="card">
      <h3>WhatsApp</h3>
      <p>55 0000 0000</p>
    </article>

    <article class="card">
      <h3>Correo</h3>
      <p>contacto@tudominio.com</p>
    </article>

    <article class="card">
      <h3>Horario</h3>
      <p>Lun–Vie 9:00 a 18:00</p>
    </article>
  </div>
</section>

<!-- MODAL COTIZAR -->
<div class="modalOverlay" id="quoteOverlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modalHeader">
      <h3>Cotización</h3>
      <button class="iconBtn" id="closeQuote" aria-label="Cerrar">✕</button>
    </div>

    <form class="quoteForm">
      <input class="input" type="text" placeholder="Nombre" required>

      <div class="row">
        <input class="input" type="email" placeholder="Correo electrónico" required>
        <input class="input" type="tel" placeholder="Teléfono" required>
      </div>

      <div class="row">
        <select class="input" required>
          <option value="">Servicio de interés</option>
          <option selected>Renta de equipo de cómputo</option>
          <option>Soporte TI</option>
          <option>Redes</option>
          <option>Seguridad</option>
        </select>
        <input class="input" type="date">
      </div>

      <textarea class="input textarea" placeholder="¿Qué podemos hacer para ayudarte?" required></textarea>

      <button class="btn-primary" style="width:100%;" type="submit">Enviar cotización</button>
    </form>
  </div>
</div>
<a class="whatsapp"
   href="https://wa.me/5215500000000?text=Hola%20RD%20Soluciones%20Tecnológicas,%20quiero%20una%20cotización."
   target="_blank"
   aria-label="WhatsApp">💬</a>
<script src="./js/app.js"></script>
</body>
</html>
